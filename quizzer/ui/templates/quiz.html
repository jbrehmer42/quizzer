<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quizzer — Quiz</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body class="quiz-body">

  <div class="progress-header">
    <span class="question-counter">Question {{ index + 1 }} of {{ total }}</span>
  </div>

  <p class="question-text">{{ question.question }}</p>

  <form method="post" action="{{ url_for('quiz_question', index=index) }}">
    <div class="answer-list">
      {% for answer in question.answers %}
        <label class="answer-card{% if loop.index0 in selected_answers %} selected{% endif %}">
          {% if question.question_type == 'single-choice' %}
            <input type="radio" name="answer_indices" value="{{ loop.index0 }}"
              {% if loop.index0 in selected_answers %}checked{% endif %}
              onchange="selectRadio(this)" />
          {% else %}
            <input type="checkbox" name="answer_indices" value="{{ loop.index0 }}"
              {% if loop.index0 in selected_answers %}checked{% endif %}
              onchange="selectCheckbox(this)" />
          {% endif %}
          <span class="answer-text">{{ answer.text }}</span>
        </label>
      {% endfor %}
    </div>

    <div class="quiz-nav">
      {% if index > 0 %}
        <button type="submit" class="btn" name="previous_button">&#8592; Previous</button>
      {% else %}
        <span></span>
      {% endif %}
      {% if index == total - 1 %}
        <button type="submit" class="btn" name="finish_button">Finish &#8594;</button>
      {% else %}
        <button type="submit" class="btn" name="next_button">Next &#8594;</button>
      {% endif %}
    </div>
  </form>

  <script>
    function selectCheckbox(checkbox) {
      checkbox.closest('.answer-card').classList.toggle('selected', checkbox.checked);
    }
    function selectRadio(radio) {
      radio.closest('form').querySelectorAll('.answer-card').forEach(el => el.classList.remove('selected'));
      radio.closest('.answer-card').classList.add('selected');
    }
  </script>

</body>
</html>
