<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quizzer — Results</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body class="quiz-body">

  <h1>Quiz Complete!</h1>

  <div class="confirm-stats">
    <div class="stat-card">
      <span class="stat-number">{{ correct }}/{{ answered }}</span>
      <span class="stat-label">correct</span>
    </div>
    <div class="stat-card stat-card--skipped">
      <span class="stat-number">{{ skipped }}</span>
      <span class="stat-label">skipped</span>
    </div>
  </div>

  <div class="results-actions">
    <a class="btn" href="{{ url_for('quiz_review', index=0) }}">Review answers &#8594;</a>
    <a class="btn btn--secondary" href="{{ url_for('home') }}">&#8592; Back to question selection</a>
  </div>

  <div class="results-question-overview">
    <h2 class="results-overview-heading">Questions</h2>
    <ul class="question-list">
      {% for q in question_outcomes %}
      <li>
        <a class="question-card question-card--outcome question-card--{{ q.outcome }}"
           href="{{ url_for('quiz_review', index=q.index) }}">
          <span class="question-index-badge">{{ q.index + 1 }}</span>
          <div class="question-body">
            <p class="question-text-preview">{{ q.text }}</p>
          </div>
        </a>
      </li>
      {% endfor %}
    </ul>
  </div>

</body>
</html>
