<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quizzer — Results</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body class="quiz-body">

  <h1>Quiz Complete!</h1>

  <div class="confirm-stats">
    <div class="stat-card">
      <span class="stat-number">{{ correct }}/{{ answered }}</span>
      <span class="stat-label">correct</span>
    </div>
    <div class="stat-card stat-card--skipped">
      <span class="stat-number">{{ skipped }}</span>
      <span class="stat-label">skipped</span>
    </div>
  </div>

  <a class="btn" href="{{ url_for('home') }}">&#8592; Back to question selection</a>

</body>
</html>
